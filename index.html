<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow - Work Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased overflow-hidden">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-50 flex flex-col items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center border border-gray-100">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-briefcase text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">WorkFlow</h1>
            <p class="text-gray-500 mb-8">Manage your tasks, track hours, and generate smart reports seamlessly.</p>
            
            <button id="btn-guest-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2">
                <i class="fas fa-user"></i> Continue as Guest
            </button>
            <p class="mt-4 text-xs text-gray-400">Your data will be saved locally for this session.</p>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="app-wrapper" class="hidden min-h-screen flex bg-gray-100">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3 text-blue-600 font-bold text-xl">
                    <i class="fas fa-briefcase"></i> WorkFlow
                </div>
                <button id="btn-close-sidebar" class="lg:hidden p-1 text-gray-500 hover:bg-gray-100 rounded-md">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="flex-1 overflow-y-auto py-4 hide-scroll">
                <ul class="space-y-1 px-3" id="nav-menu">
                    <!-- Nav items injected via JS -->
                </ul>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 shrink-0">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <div class="truncate text-sm">
                            <p class="font-medium text-gray-800 truncate" id="user-display-name">User</p>
                            <p class="text-xs text-gray-500 truncate" id="user-display-id">...</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <!-- Mobile Header -->
            <header class="lg:hidden bg-white border-b border-gray-200 p-4 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3 text-blue-600 font-bold text-lg">
                    <i class="fas fa-briefcase"></i> WorkFlow
                </div>
                <button id="btn-open-sidebar" class="p-2 -mr-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bars"></i>
                </button>
            </header>

            <!-- Dynamic Content -->
            <div id="content-area" class="flex-1 overflow-y-auto p-4 sm:p-6">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- MODALS -->

    <!-- Modal Backdrop -->
    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm items-center justify-center p-4 z-[60]">
        
        <!-- Add Task Modal -->
        <div id="modal-add-task" class="hidden bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-semibold text-gray-800">Add New Task</h2>
                <button class="modal-close-btn p-1 hover:bg-gray-200 rounded-full transition-colors">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <div class="p-4 overflow-y-auto">
                <form id="form-add-task" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Work Name *</label>
                        <input required type="text" id="task-name" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="E.g., Complete UI Design">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <div id="category-select-wrapper" class="flex gap-2">
                            <select id="task-category" class="w-full p-2 border rounded-md bg-white"></select>
                            <button type="button" id="btn-show-add-category" class="px-3 border border-dashed border-gray-400 text-gray-600 rounded-md hover:bg-gray-50 flex items-center" title="Add Category">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="category-add-wrapper" class="hidden gap-2">
                            <input type="text" id="new-category-name" class="w-full p-2 border rounded-md" placeholder="New Category Name">
                            <button type="button" id="btn-add-category" class="bg-green-600 text-white px-3 rounded-md hover:bg-green-700">Add</button>
                            <button type="button" id="btn-cancel-category" class="bg-gray-200 text-gray-700 px-3 rounded-md hover:bg-gray-300">Cancel</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Assigned Date</label>
                            <input type="date" id="task-assigned-date" class="w-full p-2 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
                            <input type="date" id="task-due-date" class="w-full p-2 border rounded-md">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Schedule Work</label>
                            <input type="date" id="task-schedule-date" class="w-full p-2 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Assigned To</label>
                            <select id="task-assigned-to" class="w-full p-2 border rounded-md bg-white"></select>
                        </div>
                    </div>

                    <div class="pt-4 border-t mt-6 flex justify-end gap-3">
                        <button type="button" class="modal-close-btn px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">Save Task</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Add/Edit Log Modal -->
        <div id="modal-log-time" class="hidden bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-semibold text-gray-800" id="log-modal-title">Log Time</h2>
                <button class="modal-close-btn p-1 hover:bg-gray-200 rounded-full transition-colors">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <div class="p-4 overflow-y-auto">
                <form id="form-log-time" class="space-y-4">
                    <input type="hidden" id="log-id">
                    <input type="hidden" id="log-date">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Work Name</label>
                        <input required type="text" id="log-work-name" class="w-full p-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500" placeholder="What did you work on?">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="log-category" class="w-full p-2 border rounded-md bg-white"></select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Hours</label>
                            <input type="number" min="0" max="24" id="log-hours" class="w-full p-2 border rounded-md" value="1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Minutes</label>
                            <input type="number" min="0" max="59" id="log-minutes" class="w-full p-2 border rounded-md" value="0">
                        </div>
                    </div>

                    <div class="pt-4 border-t mt-6 flex justify-end gap-3">
                        <button type="button" class="modal-close-btn px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors">Save Log</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <!-- Application Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & Initialization ---
        let firebaseConfig = { apiKey: "mock", authDomain: "mock", projectId: "mock", appId: "mock" };
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Config parse error:", e);
        }
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- State Management ---
        let currentUser = null;
        let isGuest = false;
        let activeTab = 'manager';
        
        let state = {
            tasks: [],
            hourlyLogs: [],
            categories: [{ id: '1', name: 'General' }, { id: '2', name: 'Meeting' }, { id: '3', name: 'Development' }],
            teamMembers: [{ id: 'm1', name: 'Self' }, { id: 'm2', name: 'John Doe' }, { id: 'm3', name: 'Jane Smith' }],
            selectedReportDate: getTodayString()
        };

        let unsubscribes = [];

        // --- DOM Elements ---
        const els = {
            login: document.getElementById('login-screen'),
            app: document.getElementById('app-wrapper'),
            content: document.getElementById('content-area'),
            navMenu: document.getElementById('nav-menu'),
            sidebar: document.getElementById('sidebar'),
            mobileOverlay: document.getElementById('mobile-overlay'),
            modalBackdrop: document.getElementById('modal-backdrop'),
            modalAddTask: document.getElementById('modal-add-task'),
            modalLogTime: document.getElementById('modal-log-time')
        };

        // --- Navigation Config ---
        const navItems = [
            { id: 'today', label: "Today's Work", icon: 'fa-calendar-alt', color: 'text-blue-600', bg: 'bg-blue-100' },
            { id: 'manager', label: "Work Manager", icon: 'fa-briefcase', color: 'text-blue-600', bg: 'bg-blue-100' },
            { id: 'hourly', label: "Hourly Report", icon: 'fa-clock', color: 'text-indigo-600', bg: 'bg-indigo-100' },
            { id: 'report', label: "Smart Report", icon: 'fa-file-alt', color: 'text-purple-600', bg: 'bg-purple-100' },
            { id: 'assistant', label: "Assistant", icon: 'fa-robot', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 'team', label: "Work Done By", icon: 'fa-users', color: 'text-teal-500', bg: 'bg-teal-50' }
        ];

        // --- Utility Functions ---
        function getTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function isOverdue(dueDate, status) {
            if (!dueDate || status === 'completed') return false;
            return new Date(dueDate) < new Date(getTodayString());
        }

        function closeSidebar() {
            els.sidebar.classList.add('-translate-x-full');
            els.mobileOverlay.classList.add('hidden');
        }

        function openSidebar() {
            els.sidebar.classList.remove('-translate-x-full');
            els.mobileOverlay.classList.remove('hidden');
        }

        // --- Auth Logic (Rule 3) ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // Show login screen if no token
                    els.login.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Auth init error:", error);
                els.login.classList.remove('hidden');
            }
        }

        document.getElementById('btn-guest-login').addEventListener('click', async (e) => {
            try {
                await signInAnonymously(auth);
                isGuest = true;
            } catch (error) {
                console.error("Guest login failed:", error);
                
                // Show inline error on the button
                const btn = e.currentTarget;
                const origText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Login Failed`;
                btn.classList.replace('bg-blue-600', 'bg-red-600');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
                
                setTimeout(() => {
                    btn.innerHTML = origText;
                    btn.classList.replace('bg-red-600', 'bg-blue-600');
                    btn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                }, 4000);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await signOut(auth);
            isGuest = false;
        });

        onAuthStateChanged(auth, (user) => {
            try {
                if (user) {
                    currentUser = user;
                    document.getElementById('user-display-id').textContent = user.uid.substring(0, 8) + '...';
                    document.getElementById('user-display-name').textContent = isGuest ? 'Guest User' : 'Authenticated User';
                    els.login.classList.add('hidden');
                    els.app.classList.remove('hidden');
                    setupFirestoreListeners();
                    renderNavigation();
                    renderActiveTab();
                    populateDropdowns();
                } else {
                    currentUser = null;
                    els.app.classList.add('hidden');
                    els.login.classList.remove('hidden');
                    // Cleanup listeners
                    unsubscribes.forEach(unsub => unsub());
                    unsubscribes = [];
                }
            } catch (error) {
                console.error("Error during auth state change:", error);
            }
        });

        // --- Firestore Data Fetching (Rules 1 & 2) ---
        function setupFirestoreListeners() {
            if (!currentUser) return;
            
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            const basePath = `artifacts/${appId}/users/${currentUser.uid}`;
            
            const tasksRef = collection(db, `${basePath}/tasks`);
            unsubscribes.push(onSnapshot(tasksRef, (snapshot) => {
                state.tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderActiveTab();
            }, console.error));

            const logsRef = collection(db, `${basePath}/hourlyLogs`);
            unsubscribes.push(onSnapshot(logsRef, (snapshot) => {
                state.hourlyLogs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(activeTab === 'hourly' || activeTab === 'report') renderActiveTab();
            }, console.error));

            const categoriesRef = collection(db, `${basePath}/categories`);
            unsubscribes.push(onSnapshot(categoriesRef, (snapshot) => {
                if (!snapshot.empty) {
                    state.categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }
                populateDropdowns();
                renderActiveTab();
            }, console.error));
        }

        // --- UI Rendering ---
        function renderNavigation() {
            els.navMenu.innerHTML = navItems.map(item => `
                <li>
                    <button data-tab="${item.id}" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-left ${activeTab === item.id ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}">
                        <i class="fas ${item.icon} w-5 text-center ${activeTab === item.id ? 'text-blue-600' : 'text-gray-400'}"></i>
                        ${item.label}
                    </button>
                </li>
            `).join('');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    activeTab = e.currentTarget.dataset.tab;
                    renderNavigation();
                    renderActiveTab();
                    closeSidebar();
                });
            });
        }

        function populateDropdowns() {
            const taskCat = document.getElementById('task-category');
            const logCat = document.getElementById('log-category');
            const taskAssign = document.getElementById('task-assigned-to');

            const catHtml = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            taskCat.innerHTML = catHtml;
            logCat.innerHTML = catHtml;

            taskAssign.innerHTML = state.teamMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        function renderActiveTab() {
            switch (activeTab) {
                case 'today': els.content.innerHTML = renderTodaysWork(); break;
                case 'manager': els.content.innerHTML = renderWorkManager(); break;
                case 'hourly': els.content.innerHTML = renderHourlyReport(); break;
                case 'report': els.content.innerHTML = renderReportTab(); break;
                case 'assistant': els.content.innerHTML = renderPlaceholder("AI Assistant", "Your smart assistant is currently learning how to help you manage your work better. Coming soon!", "fa-robot", "text-blue-500", "bg-blue-50"); break;
                case 'team': els.content.innerHTML = renderPlaceholder("Work Done By (Team)", "View detailed analytics on team performance and task completion rates. This feature is under development.", "fa-users", "text-teal-500", "bg-teal-50"); break;
            }
        }

        // --- Render Functions for Tabs ---

        function renderWorkManager() {
            let rows = state.tasks.length === 0 ? `
                <tr><td colspan="7" class="p-8 text-center text-gray-500">No tasks found. Click "Add Task" to create one.</td></tr>
            ` : state.tasks.map(task => {
                const overdue = isOverdue(task.dueDate, task.status);
                const catName = state.categories.find(c => c.id === task.category)?.name || 'Unknown';
                const memberName = state.teamMembers.find(m => m.id === task.assignedTo)?.name || 'Unknown';
                
                return `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors ${overdue ? 'bg-red-50/30' : ''}">
                    <td class="p-4">
                        <button class="focus:outline-none toggle-task-btn" data-id="${task.id}">
                            ${task.status === 'completed' 
                                ? '<i class="fas fa-check-circle text-2xl text-green-500"></i>' 
                                : '<div class="w-6 h-6 rounded-full border-2 border-gray-300 hover:border-blue-500 transition-colors"></div>'
                            }
                        </button>
                    </td>
                    <td class="p-4 font-medium text-gray-800">
                        <div class="${task.status === 'completed' ? 'line-through text-gray-400' : ''}">
                            ${task.name}
                            ${overdue ? '<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">Overdue</span>' : ''}
                        </div>
                    </td>
                    <td class="p-4 text-gray-600 hidden md:table-cell">${catName}</td>
                    <td class="p-4 text-gray-500 text-sm hidden lg:table-cell">${task.assignedDate}</td>
                    <td class="p-4 text-sm ${overdue ? 'text-red-600 font-bold' : 'text-gray-600'}">${task.dueDate || 'N/A'}</td>
                    <td class="p-4 text-gray-600 hidden sm:table-cell">${memberName}</td>
                    <td class="p-4 text-right">
                        <button class="delete-task-btn p-2 text-gray-400 hover:text-red-500 transition-colors rounded-full hover:bg-red-50" data-id="${task.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            return `
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">Work Manager</h2>
                <button id="btn-open-add-task" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fas fa-plus"></i> <span class="hidden sm:inline">Add Task</span>
                </button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm">
                                <th class="p-4 font-semibold w-16">Status</th>
                                <th class="p-4 font-semibold">Work Name</th>
                                <th class="p-4 font-semibold hidden md:table-cell">Category</th>
                                <th class="p-4 font-semibold hidden lg:table-cell">Assigned Date</th>
                                <th class="p-4 font-semibold">Due Date</th>
                                <th class="p-4 font-semibold hidden sm:table-cell">Assigned To</th>
                                <th class="p-4 font-semibold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </div>`;
        }

        function renderTodaysWork() {
            const today = getTodayString();
            const todaysTasks = state.tasks.filter(t => t.scheduleDate === today || t.dueDate === today);

            let content = todaysTasks.length === 0 ? `
                <div class="col-span-full bg-white p-8 rounded-xl border border-gray-100 text-center shadow-sm">
                    <i class="fas fa-calendar-alt text-5xl text-gray-300 mb-4 block"></i>
                    <p class="text-gray-500">No tasks scheduled or due today. Enjoy your day or add some work!</p>
                </div>
            ` : todaysTasks.map(task => {
                const overdue = isOverdue(task.dueDate, task.status);
                const catName = state.categories.find(c => c.id === task.category)?.name || 'No Category';
                const memberName = state.teamMembers.find(m => m.id === task.assignedTo)?.name || 'Unassigned';
                const borderClass = task.status === 'completed' ? 'bg-green-500' : (overdue ? 'bg-red-500' : 'bg-blue-500');

                return `
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full ${borderClass}"></div>
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-semibold ${task.status === 'completed' ? 'line-through text-gray-400' : 'text-gray-800'} text-lg leading-tight">${task.name}</h3>
                        ${task.status === 'completed' ? '<i class="fas fa-check-circle text-green-500 shrink-0"></i>' : ''}
                    </div>
                    <div class="space-y-2 text-sm text-gray-600">
                        <div class="flex items-center gap-2"><i class="fas fa-briefcase w-4 text-gray-400"></i> <span>${catName}</span></div>
                        <div class="flex items-center gap-2"><i class="fas fa-user w-4 text-gray-400"></i> <span>${memberName}</span></div>
                        <div class="flex items-center gap-2 ${overdue ? 'text-red-600 font-medium' : ''}"><i class="fas fa-clock w-4 text-gray-400"></i> <span>Due: ${task.dueDate || 'N/A'}</span></div>
                    </div>
                </div>`;
            }).join('');

            const dateStr = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            return `
            <div class="flex items-center gap-3 mb-6">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-xl"><i class="fas fa-calendar-alt text-xl"></i></div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Today's Work</h2>
                    <p class="text-gray-500 text-sm">${dateStr}</p>
                </div>
            </div>
            <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">${content}</div>`;
        }

        function renderHourlyReport() {
            const logsForDate = state.hourlyLogs.filter(log => log.date === state.selectedReportDate);
            
            // Stats logic
            const totalMinutesLogged = logsForDate.reduce((acc, curr) => acc + (curr.hours * 60) + curr.minutes, 0);
            const workingHoursStr = `${Math.floor(totalMinutesLogged / 60)}h ${totalMinutesLogged % 60}m`;
            const totalDayMinutes = 24 * 60;
            const assumedSleepMinutes = 8 * 60; 
            const freeMinutes = totalDayMinutes - totalMinutesLogged - assumedSleepMinutes;
            const freeHoursStr = `${Math.floor(Math.max(0, freeMinutes) / 60)}h ${Math.max(0, freeMinutes) % 60}m`;

            let logsHtml = logsForDate.length === 0 ? `
                <div class="p-8 text-center text-gray-500">
                    <i class="fas fa-clock text-5xl text-gray-300 block mb-4"></i>
                    <p>No hours logged for ${state.selectedReportDate}.</p>
                </div>
            ` : `<div class="divide-y divide-gray-100">` + logsForDate.map(log => {
                const catName = state.categories.find(c => c.id === log.category)?.name || 'Misc';
                return `
                <div class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                    <div>
                        <h4 class="font-semibold text-gray-800">${log.workName}</h4>
                        <div class="flex items-center gap-3 text-sm mt-1 text-gray-500">
                            <span class="bg-gray-100 px-2 py-0.5 rounded text-xs font-medium text-gray-600">${catName}</span>
                            <span>${log.hours}h ${log.minutes}m</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button class="edit-log-btn p-2 text-gray-400 hover:text-blue-600 rounded-full hover:bg-blue-50 transition-colors" data-log='${JSON.stringify(log)}'>
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="delete-log-btn p-2 text-gray-400 hover:text-red-600 rounded-full hover:bg-red-50 transition-colors" data-id="${log.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>`;
            }).join('') + `</div>`;

            return `
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Hourly Report</h2>
                    <p class="text-gray-500 text-sm">Track your daily 24-hour distribution</p>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <input type="date" id="report-date-picker" value="${state.selectedReportDate}" class="p-2 border border-gray-300 rounded-lg shadow-sm outline-none w-full sm:w-auto focus:ring-2 focus:ring-indigo-500">
                    <button id="btn-open-log" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-lg shadow-sm transition-colors shrink-0">
                        <i class="fas fa-plus px-1"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-indigo-100 flex flex-col items-center justify-center text-center">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Working</span>
                    <span class="text-xl sm:text-2xl font-bold text-indigo-600">${workingHoursStr}</span>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-green-100 flex flex-col items-center justify-center text-center">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Free Time</span>
                    <span class="text-xl sm:text-2xl font-bold text-green-600">${freeHoursStr}</span>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-purple-100 flex flex-col items-center justify-center text-center">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Sleep (Est)</span>
                    <span class="text-xl sm:text-2xl font-bold text-purple-600">8h 0m</span>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                ${logsHtml}
            </div>`;
        }

        function renderReportTab() {
            const uniqueCats = new Set(state.hourlyLogs.map(l => l.category)).size;
            const earliestDate = state.hourlyLogs.length > 0 
                ? new Date(Math.min(...state.hourlyLogs.map(l => new Date(l.date).getTime()))).toLocaleDateString() 
                : 'N/A';

            return `
            <div class="flex items-center gap-3 mb-6">
                <div class="p-3 bg-purple-100 text-purple-600 rounded-xl"><i class="fas fa-file-alt text-xl"></i></div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Auto Generated Report</h2>
                    <p class="text-gray-500 text-sm">Download your smart reports</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm max-w-2xl">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">Generate Smart Report</h3>
                <p class="text-gray-600 mb-6">Generate a comprehensive report of all logged hours, categorized by work type. This report helps in tracking productivity and billing.</p>
                
                <div class="bg-purple-50 p-4 rounded-lg border border-purple-100 mb-6">
                    <h4 class="font-medium text-purple-800 mb-2 flex items-center gap-2">
                        <i class="fas fa-info-circle"></i> Report Insights
                    </h4>
                    <ul class="text-sm text-purple-700 space-y-1 list-disc list-inside">
                        <li>Total Logs Recorded: ${state.hourlyLogs.length}</li>
                        <li>Unique Categories Used: ${uniqueCats}</li>
                        <li>Data from: ${earliestDate} to Present</li>
                    </ul>
                </div>

                <button id="btn-download-csv" class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-medium transition-colors w-full sm:w-auto justify-center">
                    <i class="fas fa-download"></i> Download CSV Report
                </button>
            </div>`;
        }

        function renderPlaceholder(title, desc, icon, color, bg) {
            return `
            <div class="p-8 flex flex-col items-center justify-center min-h-[60vh] text-center">
                <div class="w-20 h-20 ${bg} rounded-full flex items-center justify-center mb-4">
                    <i class="fas ${icon} text-4xl ${color}"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">${title}</h2>
                <p class="text-gray-500 max-w-md">${desc}</p>
            </div>`;
        }

        // --- Event Delegation & Handlers ---
        
        // Mobile Sidebar Toggles
        document.getElementById('btn-open-sidebar').addEventListener('click', openSidebar);
        document.getElementById('btn-close-sidebar').addEventListener('click', closeSidebar);
        els.mobileOverlay.addEventListener('click', closeSidebar);

        // Modals Toggles
        function openModal(modalEl) {
            els.modalBackdrop.classList.remove('hidden');
            els.modalBackdrop.classList.add('flex');
            modalEl.classList.remove('hidden');
        }

        function closeModals() {
            els.modalBackdrop.classList.add('hidden');
            els.modalBackdrop.classList.remove('flex');
            els.modalAddTask.classList.add('hidden');
            els.modalLogTime.classList.add('hidden');
        }

        document.querySelectorAll('.modal-close-btn').forEach(btn => btn.addEventListener('click', closeModals));
        
        // Add Task Logic
        document.getElementById('content-area').addEventListener('click', async (e) => {
            // Add Task Button
            if (e.target.closest('#btn-open-add-task')) {
                document.getElementById('form-add-task').reset();
                document.getElementById('task-assigned-date').value = getTodayString();
                document.getElementById('task-schedule-date').value = getTodayString();
                openModal(els.modalAddTask);
            }
            
            // Toggle Task Status
            const toggleBtn = e.target.closest('.toggle-task-btn');
            if (toggleBtn && currentUser) {
                const taskId = toggleBtn.dataset.id;
                const task = state.tasks.find(t => t.id === taskId);
                if (task) {
                    const newStatus = task.status === 'completed' ? 'pending' : 'completed';
                    await updateDoc(doc(db, `artifacts/${appId}/users/${currentUser.uid}/tasks`, taskId), { status: newStatus });
                }
            }

            // Delete Task
            const delTaskBtn = e.target.closest('.delete-task-btn');
            if (delTaskBtn && currentUser) {
                const taskId = delTaskBtn.dataset.id;
                await deleteDoc(doc(db, `artifacts/${appId}/users/${currentUser.uid}/tasks`, taskId));
            }

            // Add Log Time
            if (e.target.closest('#btn-open-log')) {
                document.getElementById('form-log-time').reset();
                document.getElementById('log-id').value = '';
                document.getElementById('log-date').value = state.selectedReportDate;
                document.getElementById('log-modal-title').textContent = 'Log Time';
                openModal(els.modalLogTime);
            }

            // Edit Log
            const editLogBtn = e.target.closest('.edit-log-btn');
            if (editLogBtn) {
                const log = JSON.parse(editLogBtn.dataset.log);
                document.getElementById('log-id').value = log.id;
                document.getElementById('log-date').value = log.date;
                document.getElementById('log-work-name').value = log.workName;
                document.getElementById('log-category').value = log.category;
                document.getElementById('log-hours').value = log.hours;
                document.getElementById('log-minutes').value = log.minutes;
                document.getElementById('log-modal-title').textContent = 'Edit Log';
                openModal(els.modalLogTime);
            }

            // Delete Log
            const delLogBtn = e.target.closest('.delete-log-btn');
            if (delLogBtn && currentUser) {
                const logId = delLogBtn.dataset.id;
                await deleteDoc(doc(db, `artifacts/${appId}/users/${currentUser.uid}/hourlyLogs`, logId));
            }

            // CSV Download
            if (e.target.closest('#btn-download-csv')) {
                let csvContent = "data:text/csv;charset=utf-8,Date,Work Name,Category,Hours,Minutes\n";
                state.hourlyLogs.forEach(log => {
                    const catName = state.categories.find(c => c.id === log.category)?.name || 'Unknown';
                    csvContent += `${log.date},"${log.workName}","${catName}",${log.hours},${log.minutes}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `work_report_${getTodayString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });

        // Date Picker Change for Report
        document.getElementById('content-area').addEventListener('change', (e) => {
            if (e.target.id === 'report-date-picker') {
                state.selectedReportDate = e.target.value;
                renderActiveTab();
            }
        });

        // Form Submit - Add Task
        document.getElementById('form-add-task').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const newTask = {
                name: document.getElementById('task-name').value,
                category: document.getElementById('task-category').value,
                assignedDate: document.getElementById('task-assigned-date').value,
                dueDate: document.getElementById('task-due-date').value,
                scheduleDate: document.getElementById('task-schedule-date').value,
                assignedTo: document.getElementById('task-assigned-to').value,
                status: 'pending'
            };
            try {
                await addDoc(collection(db, `artifacts/${appId}/users/${currentUser.uid}/tasks`), newTask);
                closeModals();
            } catch (error) { console.error("Error adding task", error); }
        });

        // Category Inline Add Logic
        const wrapperSelect = document.getElementById('category-select-wrapper');
        const wrapperAdd = document.getElementById('category-add-wrapper');
        const inputNewCat = document.getElementById('new-category-name');

        document.getElementById('btn-show-add-category').addEventListener('click', () => {
            wrapperSelect.classList.add('hidden');
            wrapperAdd.classList.remove('hidden');
            wrapperAdd.classList.add('flex');
            inputNewCat.focus();
        });

        document.getElementById('btn-cancel-category').addEventListener('click', () => {
            wrapperAdd.classList.add('hidden');
            wrapperAdd.classList.remove('flex');
            wrapperSelect.classList.remove('hidden');
            inputNewCat.value = '';
        });

        document.getElementById('btn-add-category').addEventListener('click', async () => {
            if (!currentUser) return;
            const name = inputNewCat.value.trim();
            if (!name) return;
            try {
                const docRef = await addDoc(collection(db, `artifacts/${appId}/users/${currentUser.uid}/categories`), { name });
                // Reset UI, select the new one (simulate selection)
                wrapperAdd.classList.add('hidden');
                wrapperAdd.classList.remove('flex');
                wrapperSelect.classList.remove('hidden');
                inputNewCat.value = '';
                // Dropdown re-populates automatically via snapshot listener
            } catch (error) { console.error("Error adding category", error); }
        });

        // Form Submit - Log Time
        document.getElementById('form-log-time').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const logId = document.getElementById('log-id').value;
            const logData = {
                date: document.getElementById('log-date').value,
                workName: document.getElementById('log-work-name').value,
                category: document.getElementById('log-category').value,
                hours: parseInt(document.getElementById('log-hours').value) || 0,
                minutes: parseInt(document.getElementById('log-minutes').value) || 0,
                timestamp: new Date().getTime()
            };

            try {
                const logsRef = collection(db, `artifacts/${appId}/users/${currentUser.uid}/hourlyLogs`);
                if (logId) {
                    await updateDoc(doc(db, `artifacts/${appId}/users/${currentUser.uid}/hourlyLogs`, logId), logData);
                } else {
                    await addDoc(logsRef, logData);
                }
                closeModals();
            } catch (error) { console.error("Error saving log", error); }
        });

        // Kickoff
        initAuth();

    </script>
</body>
</html>
