<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow - Work Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased overflow-hidden">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-50 flex flex-col items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center border border-gray-100">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-briefcase text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">WorkFlow</h1>
            <p class="text-gray-500 mb-8">Manage your tasks, track hours, and generate smart reports seamlessly.</p>
            
            <button id="btn-guest-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2">
                <i class="fas fa-user"></i> Continue as Guest
            </button>
            <p class="mt-4 text-xs text-gray-400">Your data will be saved locally for this session.</p>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="app-wrapper" class="hidden min-h-screen flex bg-gray-100">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3 text-blue-600 font-bold text-xl">
                    <i class="fas fa-briefcase"></i> WorkFlow
                </div>
                <button id="btn-close-sidebar" class="lg:hidden p-1 text-gray-500 hover:bg-gray-100 rounded-md">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="flex-1 overflow-y-auto py-4 hide-scroll">
                <ul class="space-y-1 px-3" id="nav-menu">
                    <!-- Nav items injected via JS -->
                </ul>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 shrink-0">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <div class="truncate text-sm">
                            <p class="font-medium text-gray-800 truncate" id="user-display-name">User</p>
                            <p class="text-xs text-gray-500 truncate" id="user-display-id">...</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <!-- Mobile Header -->
            <header class="lg:hidden bg-white border-b border-gray-200 p-4 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3 text-blue-600 font-bold text-lg">
                    <i class="fas fa-briefcase"></i> WorkFlow
                </div>
                <button id="btn-open-sidebar" class="p-2 -mr-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bars"></i>
                </button>
            </header>

            <!-- Dynamic Content -->
            <div id="content-area" class="flex-1 overflow-y-auto p-4 sm:p-6">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- MODALS -->
